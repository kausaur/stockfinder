services:
  - type: web
    name: stockfinder-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "8080"

  - type: web
    name: stockfinder-ui
    runtime: static
    buildCommand: cd src/Nifty50.Web && npm install && npm run build
    staticPublishPath: src/Nifty50.Web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
